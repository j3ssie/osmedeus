kind: module
name: test-agent-acp-minimal
description: Minimal agent-acp step test
tags: test,agent-acp,quick

params:
  - name: target
    required: true
    default: example.com

steps:
  - name: quick-acp-agent
    type: agent-acp
    agent: claude-code
    messages:
      - role: user
        content: "Run 'echo hello {{Target}}' and tell me the output."
    exports:
      result: "{{acp_output}}"
